name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
      - uses: actions/setup-dotnet@4
      - with:
        dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore backend/global.sln
      - name: Build
        run: dotnet build backend/global.sln --no-restore
